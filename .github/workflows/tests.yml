name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  collect:
    name: Pytest collection (no ML stack)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Pytest collection — Artemis tests should skip cleanly
        # All four tests in tests/ are hardware-bound smoke scripts: they need
        # a real A-series checkpoint + transformers + CUDA. Each file's top
        # guard (`if "pytest" in sys.modules: pytest.skip(allow_module_level=True)`)
        # makes pytest find the files but collect zero tests, which pytest
        # reports as exit code 5 ("no tests collected"). That's the success
        # case for us — accept it explicitly while still failing on real
        # import errors (collection errors return a different non-zero code).
        run: |
          set +e
          python -m pytest tests/ --collect-only -q
          rc=$?
          if [ $rc -ne 0 ] && [ $rc -ne 5 ]; then
            echo "pytest exit $rc — real failure"; exit $rc
          fi
          python -m pytest tests/ -v
          rc=$?
          if [ $rc -ne 0 ] && [ $rc -ne 5 ]; then
            exit $rc
          fi

  package:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Twine check
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
