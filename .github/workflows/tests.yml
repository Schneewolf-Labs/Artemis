name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  collect:
    name: Pytest collection (no ML stack)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Pytest collection — Artemis tests should skip cleanly
        # Without an ML stack every file in tests/ skips at module load: the
        # four hardware smoke scripts via their `if "pytest" in sys.modules`
        # guard (they need a real A-series checkpoint + CUDA), and the CPU
        # unit tests via `pytest.importorskip("torch")`. pytest reports zero
        # collected tests as exit code 5 ("no tests collected") — that's the
        # success case here; accept it explicitly while still failing on real
        # import errors (collection errors return a different non-zero code).
        # The `unit` job below installs a CPU ML stack and actually RUNS the
        # unit tests.
        run: |
          set +e
          python -m pytest tests/ --collect-only -q
          rc=$?
          if [ $rc -ne 0 ] && [ $rc -ne 5 ]; then
            echo "pytest exit $rc — real failure"; exit $rc
          fi
          python -m pytest tests/ -v
          rc=$?
          if [ $rc -ne 0 ] && [ $rc -ne 5 ]; then
            exit $rc
          fi

  unit:
    name: Unit tests (CPU ML stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install CPU PyTorch + package
        # CPU wheels first so `pip install -e .` doesn't pull the CUDA build.
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[test]"

      - name: Run pytest (CPU unit tests must run, hardware smokes skip)
        # No exit-5 allowance here: with the ML stack installed, the
        # generate() image-injection regression tests MUST collect and run.
        # Exit 5 would mean they silently stopped running — that's a failure.
        run: python -m pytest tests/ -v

  package:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Twine check
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
